<button class="w-full h-[54px] bg-primary text-on-primary rounded-2xl font-headline-md text-headline-md flex items-center justify-center gap-3 active:scale-95 transition-all duration-200 shadow-lg shadow-primary/20">
<span>Go to Checkout</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>

</div>

<!-- Navigation Bar Logic (Suppressed for transactional screen) -->
<!-- As per "Shell Visibility & Relevance" rule: Transactional screens hide the global navigation shell -->
<script>
        // Subtle micro-interactions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.opacity = '0.7';
            });
            btn.addEventListener('touchend', () => {
                btn.style.opacity = '1';
            });
        });

        // Scroll listener for TopAppBar glass effect intensity
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });
    </script>
