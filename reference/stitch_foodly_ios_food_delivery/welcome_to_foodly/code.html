<style>
        body {

            animation: float 6s ease-in-out infinite;

<body class="bg-background text-on-surface antialiased overflow-x-hidden">

<!-- The TopAppBar and BottomNavBar are NOT rendered here because this is an onboarding "Welcome Screen". -->
<main class="relative min-h-screen flex flex-col justify-between overflow-hidden">
<!-- High-Impact Hero Section -->
<div class="absolute inset-0 z-0">
<div class="w-full h-[663px] relative overflow-hidden">

<div class="absolute inset-0 hero-gradient"></div>
</div>

<div class="flex items-center gap-2">
<span class="text-primary font-headline-lg-mobile text-headline-lg-mobile tracking-tighter">Foodly</span>
</div>
</header>
<!-- Onboarding Content Canvas -->
<div class="relative z-10 px-margin-mobile pb-12 flex flex-col items-center text-center">
<!-- Animated Decorative Element -->
<div class="mb-stack-lg animate-float">
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary-fixed text-4xl">restaurant</span>
</div>
</div>
<!-- Typography & Copy -->
<h1 class="font-display-lg text-display-lg text-on-surface mb-stack-md max-w-[320px]">
                Elevate Your Culinary Journey
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-lg max-w-[340px]">
                Experience premium dining from the city's finest chefs, delivered with the precision and elegance you deserve.
            </p>
<!-- Interaction Layer: CTA -->
<div class="w-full max-w-md flex flex-col gap-4">
<button class="h-[54px] w-full bg-primary text-on-primary font-headline-md text-headline-md rounded-[24px] shadow-[0_4px_20px_rgba(179,41,15,0.2)] active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2" onclick="window.location.reload()">
                    Get Started

</button>
<button class="h-[54px] w-full bg-surface-container-low text-on-surface font-body-lg text-body-lg rounded-[24px] active:scale-95 transition-all duration-200">
                    Log In
                </button>
</div>
<!-- Legal/Small Print -->

                    By continuing, you agree to our Terms of Service
                </p>
</footer>
</div>
<!-- Aesthetic Lighting/Atmospheric Effect -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[150%] h-[300px] bg-primary/5 blur-[120px] rounded-full pointer-events-none -z-10"></div>
</main>
<script>
        // Simple Micro-interaction for the logo
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('header div');
            logo.addEventListener('touchstart', () => {
                logo.style.transform = 'scale(0.98)';
            });
            logo.addEventListener('touchend', () => {
                logo.style.transform = 'scale(1)';
            });
        });

        // Safe Area Handling for notch devices
        const setSafeArea = () => {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setSafeArea);
        setSafeArea();
    </script>
