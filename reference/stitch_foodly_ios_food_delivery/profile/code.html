</div>

<script>
        // Micro-interaction for list items
        document.querySelectorAll('.ios-list-item').forEach(item => {
            item.addEventListener('touchstart', function() {
                this.classList.add('bg-surface-container-low');
            });
            item.addEventListener('touchend', function() {
                setTimeout(() => {
                    this.classList.remove('bg-surface-container-low');
                }, 100);
            });
        });

        // Simple scroll behavior for top bar
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-md');
                header.classList.remove('shadow-sm');
            } else {
                header.classList.add('shadow-sm');
                header.classList.remove('shadow-md');
            }
        });
    </script>
